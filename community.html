<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSPAZZ | Community Fan Wall</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-top: 80px; }
        .engage { 
            min-height: calc(100vh - 150px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle at center, var(--bg-soft) 0%, var(--bg-dark) 100%);
        }
    </style>
</head>
<body>

    <nav id="navbar" class="scrolled">
        <div class="container">
            <a href="index.html" class="logo">TSPAZZ</a>
            <ul class="nav-links">
                <li><a href="index.html#music">Music</a></li>
                <li><a href="video.html">Video</a></li>
                <li><a href="community.html">Community</a></li>
            </ul>
        </div>
    </nav>

    <section id="engagement" class="engage">
        <div class="container community-layout" style="width: 100%;">
            
            <div class="community-image glass" data-reveal>
                <img src="TSpazz Photos/Screenshot 2026-03-12 at 12.59.20.png" alt="TSpazz Community">
                <div class="community-image-overlay">
                    <h2>Join The Inner Circle</h2>
                </div>
            </div>

            <div class="chat-container glass" data-reveal>
                <div class="chat-header">
                    <h2>The Fan Wall</h2>
                    <p>Live chat with the TSpazz community.</p>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <div class="chat-message" style="margin: auto; background: transparent; border: none; opacity: 0.5;">
                        <p>Loading connection to the server...</p>
                    </div>
                </div>
                <form class="chat-form" id="chat-form">
                    <input type="text" id="chat-name" placeholder="Your Name" required maxlength="20">
                    <div class="chat-input-row">
                        <input type="text" id="chat-input" placeholder="Type a message..." required autocomplete="off">
                        <button type="submit" class="btn">Send</button>
                    </div>
                </form>
            </div>
            
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="logo" style="margin-bottom: 2rem;">TSPAZZ</div>
            <div class="social-links">
                <a href="https://www.instagram.com/theofficialtspazz/" target="_blank">Instagram</a>
                <a href="https://youtube.com/@theofficialtspazz?si=AUqrO7vL8q3sMleC" target="_blank">YouTube</a>
                <a href="https://music.apple.com/us/artist/tspazz/1848695649" target="_blank">Apple Music</a>
            </div>
            <p>&copy; 2026 TSpazz. All rights reserved. | Designed by EQX.</p>
        </div>
    </footer>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="firebase-chat.js?v=refresh"></script>
    <script src="main.js"></script>
</body>
</html>
